<!DOCTYPE html>
<html lang="{{ lang }}" dir="{{ labels.get('dir', 'ltr') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AYP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" href="{{ url_for('static', filename='images/favicon.svg') }}" type="image/svg+xml">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="site-header py-4 shadow-sm">
        <div class="container d-flex align-items-center justify-content-between">
            <a href="/home?lang={{ lang }}" class="brand-link d-flex align-items-center gap-2 text-decoration-none">
                <span class="brand-mark"><i class="fas fa-seedling"></i></span>
                <div>
                    <h1 class="mb-0">AYP</h1>
                </div>
            </a>
            <nav class="d-none d-md-flex gap-4 align-items-center">
                <a href="/home?lang={{ lang }}" class="nav-link">Home</a>
                <a href="/dashboard?lang={{ lang }}" class="nav-link">Dashboard</a>
                <a href="/about?lang={{ lang }}" class="nav-link">About</a>
                <a href="/home?lang={{ lang }}#contact" class="nav-link">Contact</a>
            </nav>
        </div>
    </header>

    <main class="py-6">
        <div class="container">
            <div class="row align-items-center g-5">
                <div class="col-lg-6">
                    <div class="card form-panel rounded-5 shadow-lg border-0 overflow-hidden">
                        <div class="card-body p-5">
                            <h3 class="fw-bold mb-3">Login to AYP</h3>
                            <p class="text-muted">Access your forecasting dashboard and review past predictions.</p>

                            {% if message %}
                            <div class="alert alert-success rounded-4 py-3">
                                {{ message }}
                            </div>
                            {% endif %}

                            <form action="/login?lang={{ lang }}" method="POST" class="row g-4">
                                <div class="col-12">
                                    <label class="form-label fw-bold">Username</label>
                                    <input type="text" name="username" class="form-control" placeholder="Your email or username" required>
                                </div>
                                <div class="col-12">
                                    <label class="form-label fw-bold">Password</label>
                                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                                </div>
                                <div class="col-12">
                                    <button type="submit" class="btn btn-primary btn-lg w-100">
                                        <i class="fas fa-sign-in-alt me-2"></i> Sign in
                                    </button>
                                </div>
                            </form>

                            <p class="text-muted small mt-4 mb-0">No account? Still explore the prediction tools on the home page.</p>
                        </div>
                    </div>
                </div>
                <div class="col-lg-6">
                    <div class="hero-visual shadow-lg rounded-4 overflow-hidden">
                        <img src="{{ url_for('static', filename='images/farm-hero.svg') }}" alt="Agriculture illustration">
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="site-footer py-4">
        <div class="container text-center text-muted small">
            Secure access for your AYP analytics workspace.
        </div>
    </footer>
</body>
</html>
