<!DOCTYPE html>
<html lang="{{ lang }}" dir="{{ labels.get('dir', 'ltr') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Received - AYP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" href="{{ url_for('static', filename='images/favicon.svg') }}" type="image/svg+xml">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="site-header py-4 shadow-sm">
        <div class="container d-flex align-items-center justify-content-between">
            <a href="/home?lang={{ lang }}&user={{ user }}" class="brand-link d-flex align-items-center gap-2 text-decoration-none">
                <span class="brand-mark"><i class="fas fa-seedling"></i></span>
                <div>
                    <h1 class="mb-0">AYP</h1>
                </div>
            </a>
            <a href="/home?lang={{ lang }}&user={{ user }}" class="btn btn-outline-primary btn-sm">Back home</a>
        </div>
    </header>

    <main class="py-6">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-7">
                    <div class="card result-card rounded-5 shadow-lg overflow-hidden border-0">
                        <div class="card-body p-5 text-center">
                            <div class="icon-circle mb-4">
                                <i class="fas fa-envelope fa-2x"></i>
                            </div>
                            <h2 class="text-primary fw-bold mb-3">Thank you, {{ name or 'friend' }}!</h2>
                            <p class="lead text-muted mb-4">We received your message and will get back to you soon.</p>
                            <a href="/home?lang={{ lang }}&user={{ user }}" class="btn btn-primary btn-lg">
                                <i class="fas fa-home me-2"></i> Return to home
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
