<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <defs>
    <linearGradient id="speedGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#74c8ff"/>
      <stop offset="100%" stop-color="#64d5a7"/>
    </linearGradient>
  </defs>
  <rect width="300" height="200" fill="none"/>
  
  <!-- Speed gauge/speedometer concept -->
  <circle cx="150" cy="120" r="60" stroke="#ffffff" stroke-width="3" fill="none" opacity="0.4"/>
  
  <!-- Arc segments -->
  <path d="M 90 120 A 60 60 0 0 1 150 60" stroke="#64d5a7" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M 150 60 A 60 60 0 0 1 210 120" stroke="#74c8ff" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.7"/>
  
  <!-- Needle pointing right -->
  <line x1="150" y1="120" x2="210" y2="120" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
  <circle cx="150" cy="120" r="6" fill="#ffffff"/>
  
  <!-- Speed marks -->
  <line x1="150" y1="55" x2="150" y2="40" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
  <line x1="210" y1="120" x2="225" y2="120" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
  
  <!-- Lightning bolt (for speed concept) -->
  <path d="M 80 50 L 90 70 L 75 70 L 95 100 L 60 100 L 85 50" stroke="#74c8ff" stroke-width="2.5" fill="#74c8ff" opacity="0.8"/>
  
  <!-- Speed indicators -->
  <text x="150" y="165" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle" opacity="0.8">FAST</text>
</svg>
