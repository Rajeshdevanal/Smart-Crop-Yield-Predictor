<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <defs>
    <linearGradient id="cardGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#64d5a7"/>
      <stop offset="100%" stop-color="#2ec99a"/>
    </linearGradient>
  </defs>
  <rect width="300" height="200" fill="none"/>
  
  <!-- Chart bars -->
  <rect x="40" y="120" width="30" height="50" fill="url(#cardGrad1)" opacity="0.8" rx="4"/>
  <rect x="85" y="80" width="30" height="90" fill="url(#cardGrad1)" opacity="0.9" rx="4"/>
  <rect x="130" y="50" width="30" height="120" fill="url(#cardGrad1)" rx="4"/>
  <rect x="175" y="90" width="30" height="80" fill="url(#cardGrad1)" opacity="0.85" rx="4"/>
  <rect x="220" y="100" width="30" height="70" fill="url(#cardGrad1)" opacity="0.75" rx="4"/>
  
  <!-- Grid lines -->
  <line x1="30" y1="170" x2="270" y2="170" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
  <line x1="30" y1="30" x2="270" y2="30" stroke="#ffffff" stroke-width="2" opacity="0.2"/>
  
  <!-- Data points -->
  <circle cx="55" cy="120" r="4" fill="#ffffff"/>
  <circle cx="100" cy="80" r="4" fill="#ffffff"/>
  <circle cx="145" cy="50" r="4" fill="#ffffff"/>
  <circle cx="190" cy="90" r="4" fill="#ffffff"/>
  <circle cx="235" cy="100" r="4" fill="#ffffff"/>
  
  <!-- Connection line -->
  <polyline points="55,120 100,80 145,50 190,90 235,100" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.6"/>
</svg>
